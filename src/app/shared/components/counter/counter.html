<div class="inline-flex items-center gap-3 bg-white rounded-xl shadow-sm border border-gray-200 px-4 py-3">
  <button
    class="w-9 h-9 flex items-center justify-center rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold text-lg cursor-pointer transition-colors border-none"
    (click)="decrement()">-</button>
  <span class="text-xl font-semibold text-gray-900 min-w-[3rem] text-center">{{ count }}</span>
  <button
    class="w-9 h-9 flex items-center justify-center rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-lg cursor-pointer transition-colors border-none"
    (click)="increment()">+</button>
</div>

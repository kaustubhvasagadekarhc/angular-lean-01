<header class="bg-gray-900 text-white shadow-lg">
  <nav class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold tracking-tight">{{ title() }}</h1>
    </div>
    @if (authService.isLoggedIn()) {
      <ul class="flex gap-6 list-none m-0 p-0">
        <li>
          <a routerLink="/home" routerLinkActive="text-indigo-400"
            class="text-gray-300 hover:text-white transition-colors duration-200 font-medium">Home</a>
        </li>
        <li>
          <a routerLink="/about" routerLinkActive="text-indigo-400"
            class="text-gray-300 hover:text-white transition-colors duration-200 font-medium">About</a>
        </li>
        <li>
          <a routerLink="/projects" routerLinkActive="text-indigo-400"
            class="text-gray-300 hover:text-white transition-colors duration-200 font-medium">Projects</a>
        </li>
        <li>
          <a routerLink="/contact" routerLinkActive="text-indigo-400"
            class="text-gray-300 hover:text-white transition-colors duration-200 font-medium">Contact</a>
        </li>
      </ul>
      <button (click)="authService.logout()"
        class="ml-6 rounded-lg bg-red-600 px-4 py-2 text-sm font-semibold text-white shadow-sm
               hover:bg-red-500 active:bg-red-700 transition-colors duration-200
               focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 focus:ring-offset-gray-900 border-none cursor-pointer">
        Logout
      </button>
    } @else {
      <a routerLink="/login" routerLinkActive="ring-indigo-400"
        class="ml-6 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm
               hover:bg-indigo-500 active:bg-indigo-700 transition-colors duration-200
               focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-gray-900">
        Login
      </a>
    }
  </nav>
</header>

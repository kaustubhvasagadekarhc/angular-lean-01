<div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex justify-center items-center z-[1000] animate-in fade-in"
  (click)="onSave()">
  <div class="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl" (click)="$event.stopPropagation()">
    <h3 class="text-xl font-semibold text-gray-900 mb-1">Edit Text</h3>
    <p class="text-sm text-gray-500 mb-5">Update the display text below</p>
    <input type="text" [value]="text" (input)="onInput(textInput.value)" #textInput
      class="w-full py-3 px-4 text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow" />
    <div class="flex justify-end gap-3 mt-6">
      <button
        class="py-2.5 px-6 rounded-lg text-sm font-medium cursor-pointer bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors border-none"
        (click)="onSave()">Cancel</button>
      <button
        class="py-2.5 px-6 rounded-lg text-sm font-medium cursor-pointer bg-indigo-600 text-white hover:bg-indigo-700 transition-colors shadow-sm border-none"
        (click)="onSave()">Save</button>
    </div>
  </div>
</div>

<section class="max-w-7xl mx-auto px-6 py-16">
  <div class="flex flex-col items-center justify-center min-h-[70vh] text-center">
    <h2 class="text-4xl font-bold text-gray-900 mb-4">Welcome Home</h2>
    <p class="text-lg text-gray-500 mb-10">Click the text below to edit it</p>
    <div
      class="text-2xl text-indigo-600 font-semibold cursor-pointer py-4 px-8 rounded-xl border-2 border-dashed border-indigo-300 bg-indigo-50 hover:bg-indigo-100 hover:border-indigo-400 transition-all duration-200"
      (click)="openModal()">
      {{ displayText() }}
    </div>
  </div>

  @if (isModalOpen()) {
    <app-edit-modal
      [text]="displayText()"
      (textChange)="displayText.set($event)"
      (close)="closeModal()" />
  }
</section>
